<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      width: 260px;
      padding: 12px;
      overflow: hidden;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }

    h2 {
      font-size: 13px;
      margin: 0 0 10px;
      color: #f0c040;
      letter-spacing: 0.03em;
    }

    .tabs {
      display: flex;
      margin-bottom: 10px;
      gap: 6px;
    }

    .tab {
      flex: 1;
      padding: 5px;
      font-size: 12px;
      font-weight: 600;
      background: #252545;
      color: #888;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      cursor: pointer;
    }

    .tab.active {
      background: #3a5fd9;
      color: #fff;
      border-color: #5577ff;
    }

    .tab-panel.hidden {
      display: none;
    }

    .track-row {
      margin-bottom: 8px;
    }

    .track-label {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .track-controls {
      display: flex;
      gap: 6px;
    }

    .track-controls select {
      flex: 1;
      min-width: 0;
      background: #252545;
      color: #eee;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      padding: 5px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .color-select-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .color-select-wrap select {
      appearance: none;
      -webkit-appearance: none;
      background: #252545;
      color: #eee;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      padding: 5px 28px 5px 24px;
      font-size: 12px;
      cursor: pointer;
      width: 90px;
    }

    .color-swatch {
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }

    .color-arrow {
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 9px;
      color: #888;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a4e;
      margin: 10px 0;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .slider-row label {
      font-size: 12px;
      color: #bbb;
      width: 58px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .slider-row span {
      font-size: 11px;
      color: #f0c040;
      width: 34px;
      flex-shrink: 0;
    }

    .slider-row input[type=range] {
      flex: 1;
      accent-color: #f0c040;
      height: 4px;
      min-width: 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      padding: 0 2px;
    }

    .toggle-row label.name {
      font-size: 12px;
      color: #bbb;
    }

    .toggle-sub {
      padding-left: 14px;
      transition: opacity 0.15s ease;
      opacity: 1;
    }

    .toggle-sub.hidden {
      opacity: .2;
      pointer-events: none;
    }

    .toggle-sub .toggle-row label.name {
      color: #888;
      font-size: 11px;
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 19px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333360;
      border-radius: 19px;
      cursor: pointer;
      transition: .2s;
      border: 1px solid #4a4a80;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 13px;
      height: 13px;
      left: 2px;
      top: 2px;
      background: #888;
      border-radius: 50%;
      transition: .2s;
    }

    input:checked+.slider {
      background: #3a5fd9;
      border-color: #5577ff;
    }

    input:checked+.slider:before {
      background: #fff;
      transform: translateX(15px);
    }

    .note {
      font-size: 10px;
      color: #555;
      margin-top: 10px;
      line-height: 1.5;
    }

    a {
      color: #f0c040;
      font-size: 10px;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #word-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }

    #word-list:empty::after {
      content: 'No saved words yet';
      color: #555;
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      display: block;
    }

    .word-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 2px;
      border-bottom: 1px solid #2a2a4e;
    }

    .word-zh {
      font-size: 20px;
      color: #fff;
      flex-shrink: 0;
      min-width: 32px;
    }

    .word-meta {
      flex: 1;
      min-width: 0;
    }

    .word-py {
      font-size: 11px;
      color: #f0c040;
    }

    .word-en {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word-del,
    .word-link {
      flex-shrink: 0;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .word-del:hover {
      color: #e06060;
    }

    .word-link:hover {
      color: #6090e0;
    }

    #export-btn,
    .export-sub-btn {
      padding: 7px;
      font-size: 12px;
      font-weight: 600;
      background: #252545;
      color: #f0c040;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      cursor: pointer;
    }

    #export-btn {
      width: 100%;
    }

    #export-btn:hover,
    .export-sub-btn:hover {
      background: #2e2e60;
    }

    #export-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #export-sub-btns {
      display: none;
      gap: 6px;
      margin-top: 6px;
    }

    #export-sub-btns.visible {
      display: flex;
    }

    .export-sub-btn {
      flex: 1;
    }

    #delete-all-btn,
    #confirm-delete-btn {
      width: 100%;
      margin-top: 6px;
      padding: 7px;
      font-size: 12px;
      font-weight: 600;
      background: #252545;
      color: #e06060;
      border: 1px solid #3a3a6a;
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    #delete-all-btn:hover,
    #confirm-delete-btn:hover {
      background: #2e2e60;
    }

    #delete-all-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #confirm-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 100%;
      background: #e06060;
      transform-origin: left;
      animation: confirm-shrink 3s linear forwards;
    }

    @keyframes confirm-shrink {
      from { width: 100%; }
      to { width: 0%; }
    }
  </style>
</head>

<body>
  <div class="tabs">
    <button class="tab active" data-tab="settings">Settings</button>
    <button class="tab" data-tab="words">Saved</button>
  </div>

  <div id="tab-settings" class="tab-panel">
    <div class="track-row">
      <div class="track-label">Top</div>
      <div class="track-controls">
        <select id="zh-track"></select>
        <div class="color-select-wrap">
          <div class="color-swatch" id="zh-swatch"></div>
          <select id="zh-color">
            <option value="#ffffff">White</option>
            <option value="#ffe97a">Yellow</option>
            <option value="#F6B8FF">Pink</option>
            <option value="#a8d8ff">Blue</option>
            <option value="#b8ffb8">Green</option>
          </select>
          <span class="color-arrow">▾</span>
        </div>
      </div>
    </div>

    <div class="track-row">
      <div class="track-label">Bottom</div>
      <div class="track-controls">
        <select id="en-track"></select>
        <div class="color-select-wrap">
          <div class="color-swatch" id="en-swatch"></div>
          <select id="en-color">
            <option value="#ffe97a">Yellow</option>
            <option value="#ffffff">White</option>
            <option value="#F6B8FF">Pink</option>
            <option value="#a8d8ff">Blue</option>
            <option value="#b8ffb8">Green</option>
          </select>
          <span class="color-arrow">▾</span>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="slider-row">
      <label for="font-scale">Scale</label>
      <span id="font-scale-val">100%</span>
      <input type="range" id="font-scale" min="50" max="200" step="5" value="100">
    </div>
    <div class="slider-row">
      <label for="sub-position">Position</label>
      <span id="sub-position-val">8%</span>
      <input type="range" id="sub-position" min="0" max="40" step="1" value="8">
    </div>

    <hr class="divider">

    <div class="toggle-row">
      <label class="name" for="tog-pinyin">Pinyin</label>
      <label class="toggle"><input type="checkbox" id="tog-pinyin" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-sub" id="sandhi-sub">
      <div class="toggle-row">
        <label class="name" for="tog-sandhi">Tone sandhi</label>
        <label class="toggle"><input type="checkbox" id="tog-sandhi" checked><span class="slider"></span></label>
      </div>
    </div>
    <div class="toggle-row">
      <label class="name" for="tog-stroke">Stroke</label>
      <label class="toggle"><input type="checkbox" id="tog-stroke" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <label class="name" for="tog-window">Window</label>
      <label class="toggle"><input type="checkbox" id="tog-window"><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <label class="name" for="tog-shadow">Shadow</label>
      <label class="toggle"><input type="checkbox" id="tog-shadow"><span class="slider"></span></label>
    </div>
  </div>

  <div id="tab-words" class="tab-panel hidden">
    <div id="word-list"></div>
    <button id="export-btn" disabled>Export all</button>
    <div id="export-sub-btns">
      <button class="export-sub-btn" id="export-anki-btn">Anki</button>
      <button class="export-sub-btn" id="export-quizlet-btn">Quizlet</button>
    </div>
    <button id="delete-all-btn" disabled>Delete all</button>
    <button id="confirm-delete-btn" style="display:none">Confirm<span id="confirm-bar"></span></button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
