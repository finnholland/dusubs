# .github/workflows/release.yml
name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download JMdict (for ja-dict.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/scriptin/jmdict-simplified/releases/latest \
            | jq -r '.assets[] | select(.name | test("^jmdict-eng-[0-9].*\\.json\\.tgz$")) | .browser_download_url')
          if [ -z "$url" ]; then
            echo "Error: could not find JMdict download URL"
            exit 1
          fi
          curl -fsSL "$url" | tar -xz
          mv jmdict-eng*.json scripts/jmdict-english.json

      - name: "Install dependencies (postinstall generates cedict.json + ja-dict.json)"
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign Firefox extension (via AMO API)
        env:
          AMO_API_KEY: ${{ vars.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          cp extension/manifests/manifest.firefox.json extension/manifest.json
          web-ext build \
            --source-dir extension \
            --artifacts-dir ./artifacts-firefox \
            --filename dusubs-firefox.xpi \
            --ignore-files manifests/manifest.chrome.json manifests/manifest.firefox.json manifests/manifest.json
          node scripts/amo-sign.js

      - name: Build Chrome extension (MV3)
        run: |
          cp extension/manifests/manifest.chrome.json extension/manifest.json
          web-ext build \
            --source-dir extension \
            --artifacts-dir ./artifacts-chrome \
            --filename dusubs-chrome.zip \
            --ignore-files manifests/manifest.firefox.json manifests/manifest.chrome.json manifests/manifest.json
          cp extension/manifests/manifest.firefox.json extension/manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts-firefox/*.xpi
            ./artifacts-chrome/dusubs-chrome.zip
          generate_release_notes: true
