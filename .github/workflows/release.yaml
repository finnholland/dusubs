# .github/workflows/release.yml
name: Build & Release Firefox Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download JMdict (for ja-dict.json)
        run: |
          url=$(curl -fsSL https://api.github.com/repos/scriptin/jmdict-simplified/releases/latest \
            | jq -r '.assets[] | select(.name | test("^jmdict-english.*\\.json\\.tgz$")) | .browser_download_url')
          curl -fsSL "$url" | tar -xz
          mv jmdict-english*.json scripts/jmdict-english.json

      - name: "Install dependencies (postinstall generates cedict.json + ja-dict.json)"
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Copy kuromoji dict files
        run: cp -r node_modules/kuromoji/dict/ dict/

      - name: Build extension
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign extension (via AMO)
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir ./artifacts \
            --api-key ${{ secrets.AMO_API_KEY }} \
            --api-secret ${{ secrets.AMO_API_SECRET }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.xpi
          generate_release_notes: true